<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a2f2b"/>
      <stop offset="100%" stop-color="#0a1a17"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bg)" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.6"/>

  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="12" fill="url(#glow)"/>

  <!-- Three arcs suggesting a mind in motion / neural paths -->
  <!-- Arc 1: upper left — thought incoming -->
  <path d="M 7 12 A 10 10 0 0 1 16 6" 
        fill="none" stroke="#10b981" stroke-width="1.5" 
        stroke-linecap="round" opacity="0.9"/>
  <!-- Arc 2: upper right — thought outgoing -->
  <path d="M 16 6 A 10 10 0 0 1 25 12" 
        fill="none" stroke="#34d399" stroke-width="1.5" 
        stroke-linecap="round" opacity="0.7"/>
  <!-- Arc 3: lower — grounding, synthesis -->
  <path d="M 6 18 A 11 11 0 0 0 26 18" 
        fill="none" stroke="#6ee7b7" stroke-width="1" 
        stroke-linecap="round" opacity="0.5"/>

  <!-- Central core — the point of awareness -->
  <circle cx="16" cy="16" r="3.5" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.9"/>
  <circle cx="16" cy="16" r="1.5" fill="#10b981" opacity="0.95"/>

  <!-- Four cardinal nodes — knowledge anchors -->
  <circle cx="16" cy="8"  r="1" fill="#34d399" opacity="0.8"/>
  <circle cx="24" cy="16" r="1" fill="#34d399" opacity="0.6"/>
  <circle cx="16" cy="24" r="1" fill="#34d399" opacity="0.4"/>
  <circle cx="8"  cy="16" r="1" fill="#34d399" opacity="0.6"/>

  <!-- Connectors — the web of associations -->
  <line x1="16" y1="12.5" x2="16" y2="9"    stroke="#10b981" stroke-width="0.6" opacity="0.5"/>
  <line x1="19.5" y1="16" x2="23" y2="16"   stroke="#10b981" stroke-width="0.6" opacity="0.4"/>
  <line x1="16" y1="19.5" x2="16" y2="23"   stroke="#10b981" stroke-width="0.6" opacity="0.3"/>
  <line x1="12.5" y1="16" x2="9" y2="16"    stroke="#10b981" stroke-width="0.6" opacity="0.4"/>
</svg>